name: Car Alerts Bot

on:
  schedule:
    - cron: "0 * * * *"              # toutes les heures à :00 (24 runs/jour)
    - cron: "30 2,6,10,14,18 * * *"  # 5 fois/jour à :30 → total 29 runs/jour = ~1798 min/mois
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode (normal | seed | dry-run)"
        required: false
        default: "normal"

permissions:
  contents: write

concurrency:
  group: car-alerts-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Vérification proxy Bright Data
        env:
          BRD_HOST: ${{ secrets.BRD_HOST }}
          BRD_PORT: ${{ secrets.BRD_PORT }}
          BRD_USER: ${{ secrets.BRD_USER }}
          BRD_PASS: ${{ secrets.BRD_PASS }}
        run: |
          python3 - <<'EOF'
          import os, sys
          host = os.getenv("BRD_HOST","")
          port = os.getenv("BRD_PORT","22225")
          user = os.getenv("BRD_USER","")
          pwd  = os.getenv("BRD_PASS","")
          if not (host and user and pwd):
              print("⚠️  Secrets BRD_HOST/BRD_USER/BRD_PASS non configurés — proxy désactivé")
              sys.exit(0)
          proxy_url = f"http://{user}:{pwd}@{host}:{port}"
          print(f"Proxy configuré : {host}:{port} (user={user[:6]}...)")
          try:
              from curl_cffi import requests as cf
              s = cf.Session(impersonate="chrome124", proxies={"http": proxy_url, "https": proxy_url})
              r = s.get("https://httpbin.org/ip", timeout=20, verify=False)
              print(f"✅ Proxy OK — IP sortante : {r.json().get('origin','?')}")
          except Exception as e:
              print(f"❌ Proxy KO : {e}")
              print("→ Vérifie ton abonnement Bright Data et les secrets GitHub")
          EOF

      - name: Run bot
        env:
          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Bright Data proxy résidentiel (bypass Cloudflare LBC + LaCentrale)
          BRD_HOST: ${{ secrets.BRD_HOST }}
          BRD_PORT: ${{ secrets.BRD_PORT }}
          BRD_USER: ${{ secrets.BRD_USER }}
          BRD_PASS: ${{ secrets.BRD_PASS }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "seed" ]; then
            python main.py --seed
          elif [ "$MODE" = "dry-run" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Commit state.json
        if: github.event.inputs.mode != 'dry-run'
        run: |
          git config user.name "car-alerts-bot"
          git config user.email "car-alerts-bot@users.noreply.github.com"
          git add state.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update state [skip ci]"
            git push
          fi
