name: Car Alerts Bot

on:
  schedule:
    - cron: "0 * * * *"              # toutes les heures à :00 (24 runs/jour)
    - cron: "30 2,6,10,14,18 * * *"  # 5 fois/jour à :30 → total 29 runs/jour = ~1798 min/mois
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode (normal | seed | dry-run)"
        required: false
        default: "normal"

permissions:
  contents: write

concurrency:
  group: car-alerts-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Vérification proxy Bright Data
        env:
          BRD_HOST:        ${{ secrets.BRD_HOST }}
          BRD_PORT:        ${{ secrets.BRD_PORT }}
          BRD_SOCKS5_PORT: ${{ secrets.BRD_SOCKS5_PORT }}
          BRD_USER:        ${{ secrets.BRD_USER }}
          BRD_PASS:        ${{ secrets.BRD_PASS }}
        run: |
          python3 - <<'EOF'
          import os, sys
          host       = os.getenv("BRD_HOST","")
          port       = os.getenv("BRD_PORT","22225")
          socks5port = os.getenv("BRD_SOCKS5_PORT","")
          user       = os.getenv("BRD_USER","")
          pwd        = os.getenv("BRD_PASS","")
          if not (host and user and pwd):
              print("⚠️  Secrets BRD_HOST/BRD_USER/BRD_PASS non configurés — proxy désactivé")
              sys.exit(0)
          from urllib.parse import quote as _q
          u, p = _q(user,safe=''), _q(pwd,safe='')

          # Test SOCKS5 + curl_cffi Chrome impersonation (optimal Cloudflare bypass)
          if socks5port:
              socks5_url = f"socks5h://{u}:{p}@{host}:{socks5port}"
              print(f"Test SOCKS5 : {host}:{socks5port}")
              try:
                  from curl_cffi import requests as cf
                  s = cf.Session(impersonate="chrome124", proxies={"https": socks5_url})
                  r = s.get("https://httpbin.org/ip", timeout=20)
                  print(f"✅ SOCKS5 + Chrome OK — IP sortante : {r.json().get('origin','?')}")
              except Exception as e:
                  print(f"⚠️  SOCKS5 KO : {e}")
          else:
              print("ℹ️  BRD_SOCKS5_PORT non défini — SOCKS5 désactivé (ajoute ce secret pour le meilleur bypass CF)")

          # Test HTTP proxy + requests (fallback)
          proxy_url = f"http://{u}:{p}@{host}:{port}"
          print(f"Test HTTP proxy : {host}:{port}")
          try:
              import requests as req
              r = req.get("https://httpbin.org/ip", proxies={"http": proxy_url, "https": proxy_url}, timeout=20, verify=False)
              print(f"✅ HTTP proxy OK (requests) — IP sortante : {r.json().get('origin','?')}")
          except Exception as e1:
              print(f"❌ HTTP proxy KO : {e1}")
              print("→ Vérifie ton abonnement Bright Data et les secrets GitHub")
          EOF

      - name: Run bot
        env:
          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Bright Data proxy (bypass Cloudflare LBC + LaCentrale)
          BRD_HOST:        ${{ secrets.BRD_HOST }}
          BRD_PORT:        ${{ secrets.BRD_PORT }}
          BRD_SOCKS5_PORT: ${{ secrets.BRD_SOCKS5_PORT }}
          BRD_USER:        ${{ secrets.BRD_USER }}
          BRD_PASS:        ${{ secrets.BRD_PASS }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "seed" ]; then
            python main.py --seed
          elif [ "$MODE" = "dry-run" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Commit state.json
        if: github.event.inputs.mode != 'dry-run'
        run: |
          git config user.name "car-alerts-bot"
          git config user.email "car-alerts-bot@users.noreply.github.com"
          git add state.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update state [skip ci]"
            git push
          fi
