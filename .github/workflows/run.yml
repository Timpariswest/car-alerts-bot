name: Car Alerts Bot

on:
  schedule:
    - cron: "0 * * * *"  # 1 run/heure = 24/jour = ~720 min/mois (< 2000 min gratuits)
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode (normal | seed | dry-run)"
        required: false
        default: "normal"

permissions:
  contents: write

concurrency:
  group: car-alerts-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run bot
        env:
          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Gmail alertes email — tous les noms de secrets supportés
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER_1:         ${{ secrets.GMAIL_USER_1 }}
          GMAIL_APP_PASSWORD_1: ${{ secrets.GMAIL_APP_PASSWORD_1 }}
          GMAIL_USER_2:         ${{ secrets.GMAIL_USER_2 }}
          GMAIL_APP_PASSWORD_2: ${{ secrets.GMAIL_APP_PASSWORD_2 }}
          # Bright Data proxy (fallback LBC/LaCentrale si email KO)
          BRD_HOST:        ${{ secrets.BRD_HOST }}
          BRD_PORT:        ${{ secrets.BRD_PORT }}
          BRD_SOCKS5_PORT: ${{ secrets.BRD_SOCKS5_PORT }}
          BRD_USER:        ${{ secrets.BRD_USER }}
          BRD_PASS:        ${{ secrets.BRD_PASS }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "seed" ]; then
            python main.py --seed
          elif [ "$MODE" = "dry-run" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Commit state.json
        if: github.event.inputs.mode != 'dry-run'
        run: |
          git config user.name "car-alerts-bot"
          git config user.email "car-alerts-bot@users.noreply.github.com"
          git add state.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update state [skip ci]"
            git pull --rebase && git push || true
          fi
