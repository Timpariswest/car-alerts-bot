# Config du bot d'alertes voitures (lecture emails officiels)
# Principe : tu configures tes recherches sur les sites, ils t'envoient les alertes
# par email, le bot lit ta boîte, score les annonces et push les bonnes affaires sur Telegram.

# Boîte Gmail à scanner (celle qui reçoit les alertes)
mailbox: "INBOX"

# Âge maximum des emails à considérer (évite de rescanner 6 mois d'archive)
max_email_age_days: 3

# Label Gmail optionnel à filtrer. Si vide, on scanne toute l'inbox filtrée par expéditeur.
# Conseil : créé un filtre Gmail "from:noreply@leboncoin.fr OR from:alerts@lacentrale.fr OR from:newsletter@autoscout24.fr"
# qui applique le label "car-alerts", puis mets ici :
label_filter: null  # ex: "car-alerts"

# Recherches — permet de tagguer chaque alerte par modèle voulu
searches:
  - name: "Clio 3"
    keywords_must: ["clio"]
    keywords_nice: ["dynamique", "expression", "tce", "1.2", "entretien", "révision", "distribution"]
    keywords_bad: ["accident", "moteur hs", "boite hs", "épave", "non roulant", "pour pièces", "fuite huile"]
    price_min: 1500
    price_max: 5500
    year_min: 2009
    year_max: 2013
    mileage_max: 180000
    # Prix marché estimé (cote moyenne € ~ modèle milieu de gamme) pour scorer les bonnes affaires
    market_price_ref: 3800

  - name: "Peugeot 308"
    keywords_must: ["308"]
    keywords_nice: ["hdi", "active", "allure", "entretien", "révision", "distribution faite", "courroie"]
    keywords_bad: ["accident", "moteur hs", "boite hs", "épave", "non roulant", "pour pièces", "voile", "fap hs"]
    price_min: 2500
    price_max: 8000
    year_min: 2011
    year_max: 2016
    mileage_max: 200000
    market_price_ref: 5200

# Scoring — poids de chaque facteur pour détecter les bonnes affaires
scoring:
  # Bonus/malus pour l'écart prix vs cote (en points)
  price_vs_market_weight: 40   # -10% sous la cote = +4 points, -30% = +12 points
  # Bonus mots-clés positifs (par mot trouvé, max)
  nice_keyword_bonus: 2
  nice_keyword_cap: 6
  # Malus mots-clés négatifs (par mot trouvé)
  bad_keyword_penalty: 5
  # Bonus si km en-dessous de la norme (15 000 km/an)
  km_under_normal_bonus: 3
  km_over_normal_penalty: 2
  # Seuil minimum pour pousser sur Telegram (en dessous : on ignore)
  min_score_to_notify: 2

# Limites de sécurité
max_notifications_per_run: 10
