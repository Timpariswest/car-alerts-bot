searches:
  - name: "Renault Clio III"
    # Doit contenir "clio" dans le titre
    keywords_must: ["clio"]
    # Bonus si ces mots apparaissent
    keywords_nice: ["dynamique", "expression", "tce", "1.2", "1.5", "dci", "entretien", "révision", "distribution", "courroie"]
    # Rejeter si ces mots apparaissent (mauvais modèle ou mauvais état)
    keywords_bad: ["clio 4", "clio iv", "clio4", "clio 5", "clio v", "clio5",
                   "clio rs", "accident", "moteur hs", "boite hs", "épave",
                   "non roulant", "pour pièces", "fuite huile", "moteur cassé"]
    price_min: null
    price_max: 3000
    year_min: null
    year_max: null
    mileage_max: 260000
    require_price: true        # ignorer les annonces sans prix affiché
    require_mileage: false
    market_price_ref: 2500   # cote moyenne Clio 3

  - name: "Peugeot 207"
    keywords_must: ["207"]
    keywords_nice: ["hdi", "sw", "break", "entretien", "révision", "distribution faite", "courroie", "1.4", "1.6"]
    keywords_bad: ["peugeot 206", "peugeot 208",
                   "rétroviseur", "rétro 207", "phare 207", "pare-choc 207",
                   "accident", "moteur hs", "boite hs", "épave",
                   "non roulant", "pour pièces", "fuite huile"]
    price_min: null
    price_max: 3000
    year_min: null
    year_max: null
    mileage_max: 260000
    require_price: true        # ignorer les annonces sans prix affiché
    require_mileage: false
    market_price_ref: 2500   # cote moyenne 207

# Scoring
# score = (cote - prix) / cote * 40 + bonus km + bonus mots-clés
# Exemples :  prix 2000€ → +8  |  prix 1500€ → +16  |  prix 1000€ → +24
scoring:
  price_vs_market_weight: 40
  nice_keyword_bonus: 2
  nice_keyword_cap: 6
  bad_keyword_penalty: 5
  km_under_normal_bonus: 3
  km_over_normal_penalty: 2
  min_score_to_notify: 8     # ≈ prix ≤ 2000€ vs cote 2500€ → marge réelle possible

max_notifications_per_run: 10
