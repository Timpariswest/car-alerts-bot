searches:
  - name: "Renault Clio III"
    keywords_must: ["clio"]

    # Bonus de score : bon état confirmé OU travaux = voiture sous-cotée (opportunité)
    keywords_nice: [
      # État positif confirmé
      "dynamique", "expression", "tce", "1.2", "1.5", "dci",
      "entretien", "révision", "distribution faite", "courroie faite",
      # Travaux à faire = voiture bradée → opportunité de marge
      "distribution à faire", "courroie à refaire", "courroie à faire",
      "embrayage", "injecteur", "fuite huile",
      # Signaux vendeur pressé = prix bradé
      "urgent", "cause déménagement", "cause départ", "à saisir",
      "vend rapidement", "prix à débattre", "négociable"
    ]

    # Rejet automatique : épaves/pièces + problèmes administratifs (dealbreakers)
    keywords_bad: [
      # Mauvais modèle
      "clio 4", "clio iv", "clio4", "clio 5", "clio v", "clio5", "clio rs",
      # Perte totale (irréparable ou sans valeur)
      "épave", "non roulant", "pour pièces", "moteur hs", "boite hs", "moteur cassé",
      "accidenté", "accident grave",
      # Réparation trop lourde
      "joint de culasse",
      # ❌ Problèmes administratifs — dealbreaker absolu
      "carte grise non au nom", "cg non au nom", "sans carte grise",
      "duplicata", "en cours d'immatriculation", "gage", "opposition",
      "papiers non disponibles", "titre de circulation"
    ]

    price_min: null
    price_max: 3000
    year_min: null
    year_max: null
    mileage_max: 260000
    require_price: true
    require_mileage: false
    market_price_ref: 2500   # cote moyenne Clio 3

  - name: "Peugeot 207"
    keywords_must: ["207"]

    keywords_nice: [
      # État positif confirmé
      "hdi", "sw", "break", "entretien", "révision", "distribution faite", "courroie faite",
      "1.4", "1.6",
      # Travaux à faire = opportunité
      "distribution à faire", "courroie à refaire", "courroie à faire",
      "embrayage", "injecteur", "fuite huile",
      # Signaux vendeur pressé
      "urgent", "cause déménagement", "cause départ", "à saisir",
      "vend rapidement", "prix à débattre", "négociable"
    ]

    keywords_bad: [
      # Mauvais modèle ou pièces détachées
      "peugeot 206", "peugeot 208",
      "rétroviseur", "rétro 207", "phare 207", "pare-choc 207",
      # Perte totale
      "épave", "non roulant", "pour pièces", "moteur hs", "boite hs",
      "accidenté", "accident grave",
      # Réparation trop lourde
      "joint de culasse",
      # ❌ Problèmes administratifs — dealbreaker absolu
      "carte grise non au nom", "cg non au nom", "sans carte grise",
      "duplicata", "en cours d'immatriculation", "gage", "opposition",
      "papiers non disponibles", "titre de circulation"
    ]

    price_min: null
    price_max: 3000
    year_min: null
    year_max: null
    mileage_max: 260000
    require_price: true
    require_mileage: false
    market_price_ref: 2500   # cote moyenne 207

# Scoring
# score = (cote - prix) / cote * 40 + bonus km + bonus mots-clés
# Exemples :  prix 2000€ → +8  |  prix 1500€ → +16  |  prix 1000€ → +24
scoring:
  price_vs_market_weight: 40
  nice_keyword_bonus: 2
  nice_keyword_cap: 10   # plafond relevé car plus de mots-clés positifs
  bad_keyword_penalty: 5
  km_under_normal_bonus: 3
  km_over_normal_penalty: 2
  min_score_to_notify: 8     # ≈ prix ≤ 2000€ vs cote 2500€ → marge réelle possible

max_notifications_per_run: 10
